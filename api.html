<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillGraph Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 50%;
        }

        .right-panel {
            width: 50%;
        }

        #simulator-controls, #task-controls {
            background-color: #f4f4f4;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }

        h2 { margin-bottom: 15px; }
        button, select, input {
            display: block;
            margin-bottom: 15px;
            padding: 10px;
            width: 100%;
        }

        .json-box {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            overflow: auto;
            height: 150px;
            font-family: monospace;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div id="simulator-controls">
            <h2>Simulator Controls</h2>
            
            <label for="simulator">Choose Simulator:</label>
            <select id="simulator">
                <option value="Moveit">Moveit</option>
                <option value="Gazebo (to be developed)">Gazebo</option>
                <option value="Issac Sim (to be developed)">Issac Sim</option>
            </select>

            <label for="robot">Choose Robot Type:</label>
            <select id="robot">
                <option value="Fanuc (to be developed)">Fanuc</option>
                <option value="GP4">GP4</option>
            </select>

            <label for="task">Choose Task:</label>
            <select id="task" placeholder="None">
                <option value="none">None</option>
                <option value="fish">Fish</option>
                <option value="stairs">Stairs</option>
                <option value="bridge">Bridge</option>
                <option value="chair">Chair</option>
                <option value="faucet">Faucet</option>
                <option value="tower">Tower</option>
                <option value="gate">Gate</option>
            </select>

            <button onclick="startSimulator()">Start Simulator</button>
        </div>

        <div id="task-controls">
            <h2>Task Controls</h2>

            <label for="skill">Choose Skill:</label>
            <select id="skill">
                <option value="Pick">Pick</option>
                <option value="PlaceTop">PlaceTop</option>
                <option value="PlaceBottom">PlaceBottom</option>
                <option value="SupportBottom">SupportBottom</option>
                <option value="SupportTop">SupportTop</option>
                <option value="Handover">HandOver</option>
                <option value="Transit">Transit</option>
                <option value="Align">Align</option>
                <option value="PlaceWithSupport">PlaceWithSupport</option>
                <option value="PickAndPlace">PickAndPlace</option>
                <option value="PickAndPlaceWithSupport">PickAndPlaceWithSupport</option>
                <option value="PickHandoverAndPlace">PickHandoverAndPlace</option>
            </select>

            <label for="object">Choose Object:</label>
            <select id="object">
                <option value="none">None</option>
            </select>

            <label for="robot-id">Robot ID:</label>
            <select id="robot-id">
                <option value="0">Robot 1</option>
                <option value="1">Robot 2</option>
            </select>

            <label for="target">Target Location:</label>
            <!-- <input type="text" id="target" placeholder="Enter target coordinates"> -->
            <div style="display: flex; gap: 10px;">
                <div>
                    <label for="target-x">X:</label>
                    <input type="text" id="target-x" placeholder="X">
                </div>
                <div>
                    <label for="target-y">Y:</label>
                    <input type="text" id="target-y" placeholder="Y">
                </div>
                <div>
                    <label for="target-z">Z:</label>
                    <input type="text" id="target-z" placeholder="Z">
                </div>
                <div>
                    <label for="target-ori">Orientation:</label>
                    <input type="text" id="target-ori" placeholder="Ori">
                </div>
            </div>

            <button onclick="runTargetTask()">Run Target Task</button>
        </div>
    </div>

    <div class="right-panel">
        <h2>Request and Response</h2>
        <div class="section-title">✅ Request Sent to Server:</div>
        <div class="json-box">
            <pre id="request-output">[Request will appear here]</pre>
        </div>

        <div class="section-title">✅ Response Received from Server:</div>
        <div class="json-box">
            <pre id="response-output">[Response will appear here]</pre>
        </div>
    </div>
</div>
<div class="json-box">
    <pre id="debug-output">[Debug data will appear here]</pre>
</div>

<script>
    let currentPid = null;

    document.getElementById('task').addEventListener('change', function() {
        fetchEnvSetup(this.value);
    });

    function fetchEnvSetup(task) {
        document.getElementById('debug-output').innerText += "Fetching JSON for task: ${task}...";

        fetch(`./config/lego_tasks/env_setup/env_setup_${task}.json`)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            document.getElementById('debug-output').innerText += "JSON fetched successfully:\n";
            updateObjectDropdown(data);
        })
        .catch(error => {
            document.getElementById('debug-output').innerText += `\n❌ Fetch error: ${error}`;
        });
    }

    function updateObjectDropdown(data) {
        let objectDropdown = document.getElementById('object'); // Assuming 'object' is the ID of the dropdown
        objectDropdown.innerHTML = ""; // Clear existing options

        let objectKeys = Object.keys(data);
        document.getElementById('debug-output').innerText += 
            "\nExtracted Objects:\n" + objectKeys.join(", ");

        if (objectKeys.length === 0) {
            document.getElementById('debug-output').innerText += "\n❌ No Objects Available!";
            return;
        }

        objectKeys.forEach(objName => {
            const option = document.createElement('option');
            option.value = objName;
            option.textContent = objName;
            object.appendChild(option);
        });
    }

    function startSimulator() {
        const command = {
            simulator: document.getElementById('simulator').value,
            robot: document.getElementById('robot').value
        };
        
        sendRequest('/start_simulator', command, (data) => {
            currentPid = data.pid;
            document.getElementById('task-controls').style.display = 'block';
        });
    }

    function runTargetTask() {
        // if (!currentPid) {
        //     alert('Please start the simulator first.');
        //     return;
        // }        
        // Parse values as integers using parseInt() or Number()
        const x = document.getElementById('target-x').value ? parseInt(document.getElementById('target-x').value, 10) : 0;
        const y = document.getElementById('target-y').value ? parseInt(document.getElementById('target-y').value, 10) : 0;
        const z = document.getElementById('target-z').value ? parseInt(document.getElementById('target-z').value, 10) : 0;
        const ori = document.getElementById('target-ori').value ? parseInt(document.getElementById('target-ori').value, 10) : 0;
        const robot_id = parseInt(document.getElementById('robot-id').value, 10);
        
        const target = {
            "x": x,
            "y": y,
            "z": z,
            "ori": ori
        };
        
        const command = {
            command_id: Date.now(),
            skill: document.getElementById('skill').value,
            object: document.getElementById('object').value,
            robot_id: robot_id, // Now this will be a number, not a string
            target: target, // Using target_location instead of target to match your JSON example
            pid: currentPid
        };
        
        sendRequest('/run_target_task', command);
    }

    function sendRequest(endpoint, command, callback) {
        document.getElementById('request-output').innerText = JSON.stringify(command, null, 4);

        fetch(`http://127.0.0.1:5000${endpoint}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(command)
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('response-output').innerText = JSON.stringify(data, null, 4);
            if (data.status === -1 && data.output === "Error: Not feasible") {
                alert("Error: The chosen set is not feasible.");
            }
            if (callback) callback(data);
        })
        .catch(() => {
            document.getElementById('response-output').innerText = JSON.stringify({ error: 'Request failed' }, null, 4);
        });
    }
</script>

</body>
</html>
